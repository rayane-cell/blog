</script><script>
/* JavaScript intégré : fonctionnement du blog */
(function () {
  const data = window.SignalData;
  if (!data) return;

  const $ = (selector, root = document) => root.querySelector(selector);
  const $$ = (selector, root = document) => Array.from(root.querySelectorAll(selector));

  function esc(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function thumb(videoId) {
    return `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
  }

  function embed(videoId, autoplay) {
    const auto = autoplay ? "&autoplay=1" : "";
    return `https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1${auto}`;
  }

  function sourcePills(sources, limit = 3) {
    return sources.slice(0, limit).map((source) => (
      `<a class="source-pill" href="${esc(source.url)}" target="_blank" rel="noreferrer">${esc(source.name)}</a>`
    )).join("");
  }

  function tagList(tags) {
    return tags.map((tag) => `<span class="tag">${esc(tag)}</span>`).join("");
  }

  function articleCard(article) {
    return `
      <a class="article-card" href="${esc(article.href)}">
        <img src="${esc(article.image)}" alt="${esc(article.title)}" loading="lazy">
        <div class="card-body">
          <div class="card-cat">${esc(article.category)}</div>
          <h3>${esc(article.title)}</h3>
          <p>${esc(article.deck)}</p>

  }

  function getVotes() {
    try {
      return JSON.parse(localStorage.getItem("signalTrendVotes") || "{}");
    } catch {
      return {};
    }
  }

  function setVotes(votes) {
    localStorage.setItem("signalTrendVotes", JSON.stringify(votes));
  }

  function rankedTrends() {
    const votes = getVotes();
    return data.trends
      .map((trend) => ({
        ...trend,
        votes: votes[trend.topic] || 0,
        total: trend.score + (votes[trend.topic] || 0) * 6
      }))
      .sort((a, b) => b.total - a.total);
  }

  function renderTrendMini() {
    const box = $("[data-trend-mini]");
    if (!box) return;
    box.innerHTML = rankedTrends().slice(0, 4).map((trend, index) => `

        <strong>${trend.total}</strong>
      </a>
    `).join("");
  }

  function renderTrendBoard() {
    const board = $("[data-trend-board]");
    if (!board) return;
    board.innerHTML = rankedTrends().map((trend, index) => {
      const width = Math.min(100, Math.max(14, trend.total));
      return `
        <article class="trend-box">
          <div class="trend-score">${index + 1}</div>
          <div>
            <div class="card-cat">${esc(trend.category)}</div>

    }).join("");

    $$("[data-vote]", board).forEach((button) => {
      button.addEventListener("click", () => {
        const votes = getVotes();
        const topic = button.dataset.vote;
        votes[topic] = (votes[topic] || 0) + 1;
        setVotes(votes);
        renderTrendBoard();
        renderTrendMini();
      });
    });
  }

  function renderHomeArticles() {
    const grid = $("[data-home-articles]");
    if (!grid) return;
    grid.innerHTML = data.articles.slice(0, 6).map(articleCard).join("");

  function renderArticlesPage() {
    const grid = $("[data-articles-grid]");
    if (!grid) return;

    const search = $("[data-article-search]");
    const filter = $("[data-article-filter]");
    const categories = ["tout", ...new Set(data.articles.map((article) => article.category))];

    if (filter && !filter.dataset.ready) {
      filter.innerHTML = categories.map((cat) => `<option value="${esc(cat)}">${esc(cat)}</option>`).join("");
      filter.dataset.ready = "true";
    }

    function update() {
      const q = (search?.value || "").trim().toLowerCase();
      const cat = filter?.value || "tout";
      const articles = data.articles.filter((article) => {
        const text = `${article.title} ${article.deck} ${article.category} ${article.tags.join(" ")}`.toLowerCase();
        return (!q || text.includes(q)) && (cat === "tout" || article.category === cat);
      });

      grid.innerHTML = articles.length
        ? articles.map(articleCard).join("")
        : `<div class="empty-state">aucun article ne correspond à cette recherche.</div>`;
    }

    search?.addEventListener("input", update);
    filter?.addEventListener("change", update);
    update();
  }

  function renderArticlePage() {
    const slug = document.body.dataset.article;
    const host = $("[data-article-page]");
    if (!slug || !host) return;

    const article = data.articles.find((item) => item.slug === slug);
    if (!article) {
      host.innerHTML = `<div class="empty-state">article introuvable.</div>`;
      return;
    }

    document.title = `${article.title} - ${data.site.name}`;
    const hero = $("[data-article-hero]");
    if (hero) hero.style.setProperty("--article-image", `url("${article.image}")`);

    $("[data-article-category]") && ($("[data-article-category]").textContent = article.category);
    $("[data-article-title]") && ($("[data-article-title]").textContent = article.title);
    $("[data-article-deck]") && ($("[data-article-deck]").textContent = article.deck);
    $("[data-article-meta]") && ($("[data-article-meta]").innerHTML = `
      <span>${esc(article.date)}</span>
      <span>${esc(article.read)}</span>
      <span>${esc(article.author)}</span>
    `);

    host.innerHTML = article.content.map((block) => {
      if (block.type === "h2") return `<h2>${esc(block.text)}</h2>`;
      if (block.type === "list") return `<ul>${block.items.map((item) => `<li>${esc(item)}</li>`).join("")}</ul>`;
      return `<p>${esc(block.text)}</p>`;
    }).join("");

    const sourceBox = $("[data-article-sources]");
    if (sourceBox) {
      sourceBox.innerHTML = article.sources.map((source) => (
        `<a href="${esc(source.url)}" target="_blank" rel="noreferrer">${esc(source.name)}</a>`
      )).join("");
    }

    const tagBox = $("[data-article-tags]");
    if (tagBox) tagBox.innerHTML = tagList(article.tags);

    const related = $("[data-related-articles]");
    if (related) {
      const relatedArticles = data.articles.filter((item) => item.slug !== slug).slice(0, 3);
      related.innerHTML = relatedArticles.map((item) => `
        <a class="stack-item" href="${esc(item.href)}">
          <img src="${esc(item.image)}" alt="${esc(item.title)}" loading="lazy">
          <span><strong>${esc(item.title)}</strong><small>${esc(item.category)} · ${esc(item.read)}</small></span>
        </a>
      `).join("");
    }

    initBookmark(article.slug);
    initReadingProgress();
  }

  function initBookmark(slug) {
    const button = $("[data-bookmark]");
    if (!button) return;
    const key = `signalBookmark:${slug}`;
    function refresh() {
      button.textContent = localStorage.getItem(key) ? "favori enregistré" : "ajouter aux favoris";
    }
    button.addEventListener("click", () => {
      if (localStorage.getItem(key)) {
        localStorage.removeItem(key);
      } else {
        localStorage.setItem(key, "1");
      }
      refresh();
    });
    refresh();
  }

  function initReadingProgress() {
    const bar = $("[data-reading-progress]");
    if (!bar) return;
    const update = () => {
      const max = document.documentElement.scrollHeight - window.innerHeight;
      const pct = max > 0 ? (window.scrollY / max) * 100 : 0;
      bar.style.width = `${pct}%`;
    };
    window.addEventListener("scroll", update, { passive: true });
    update();
  }

  function renderVideoTheater() {
    const host = $("[data-video-theater]");
    if (!host) return;
    const first = data.videos[0];
    const limit = Number(host.dataset.limit || data.videos.length);
    host.innerHTML = `
      <div>
        <div class="video-frame">
          <iframe data-main-video src="${embed(first.id, false)}" title="${esc(first.title)}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
        </div>
        <div class="video-info">
          <div class="card-cat" data-video-cat>${esc(first.category)}</div>
          <h3 data-video-title>${esc(first.title)}</h3>
          <p data-video-desc>${esc(first.desc)}</p>
          <div class="video-meta"><span class="video-source">source : ${esc(first.source)}</span></div>
        </div>
      </div>
      <div class="playlist">
        ${data.videos.slice(0, limit).map((video, index) => `
          <button type="button" class="${index === 0 ? "active" : ""}" data-video-id="${esc(video.id)}">
            <img src="${thumb(video.id)}" alt="${esc(video.title)}" loading="lazy">
            <span>
              <strong>${esc(video.title)}</strong>
              <small class="video-source">source : ${esc(video.source)}</small>
            </span>
          </button>
        `).join("")}
      </div>
    `;

    $$("[data-video-id]", host).forEach((button) => {
      button.addEventListener("click", () => {
        const video = data.videos.find((item) => item.id === button.dataset.videoId);
        if (!video) return;
        $$("[data-video-id]", host).forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        $("[data-main-video]", host).src = embed(video.id, true);
        $("[data-main-video]", host).title = video.title;
        $("[data-video-cat]", host).textContent = video.category;
        $("[data-video-title]", host).textContent = video.title;
        $("[data-video-desc]", host).textContent = video.desc;
        $(".video-meta", host).innerHTML = `<span class="video-source">source : ${esc(video.source)}</span>`;
      });
    });
  }

  function renderVideoGrid() {
    const grid = $("[data-video-grid]");

  function initQuiz() {
    const host = $("[data-quiz]");
    if (!host) return;
    const questions = [
      { q: "Dans une logique zero trust, on vérifie surtout...", o: ["chaque demande selon son contexte", "uniquement le réseau interne", "la couleur du logo"], a: 0 },
      { q: "Une source officielle sert d'abord à...", o: ["confirmer une information", "remplacer toute analyse", "faire joli en bas de page"], a: 0 },
      { q: "Pour un agent IA, la meilleure mission est souvent...", o: ["courte et vérifiable", "floue et infinie", "sans garde-fou"], a: 0 },
      { q: "En OSINT responsable, il faut...", o: ["limiter la collecte utile", "tout publier sans filtre", "ignorer le contexte"], a: 0 }
    ];
    let index = 0;
    let score = 0;

    function draw() {
      const item = questions[index];
      host.innerHTML = `
        <p><strong>question ${index + 1}/${questions.length}</strong></p>
        <h3>${esc(item.q)}</h3>
        <div class="quiz-options">
          ${item.o.map((option, optionIndex) => `<button type="button" data-answer="${optionIndex}">${esc(option)}</button>`).join("")}
        </div>
        <p>score : <strong>${score}</strong></p>
      `;
      $$("[data-answer]", host).forEach((button) => {
        button.addEventListener("click", () => {
          const good = Number(button.dataset.answer) === item.a;
          button.classList.add(good ? "good" : "bad");
          if (good) score += 1;
          setTimeout(() => {
            index += 1;
            if (index >= questions.length) {
              host.innerHTML = `
                <h3>résultat : ${score}/${questions.length}</h3>
                <p>${score >= 3 ? "Solide. Tu peux passer aux articles longs." : "Pas grave, les tutos sont là pour chauffer le moteur."}</p>
                <button class="game-action" type="button" data-restart-quiz>rejouer</button>
              `;
              $("[data-restart-quiz]", host).addEventListener("click", () => {
                index = 0;
                score = 0;
                draw();
              });
            } else {
              draw();
            }
          }, 520);
        });
      });
    }
    draw();
  }

  function initMemory() {
    const host = $("[data-memory]");
    if (!host) return;
    const values = ["iam", "xss", "rss", "ctf", "llm", "hash"];
    let cards = [];
    let opened = [];
    let matched = 0;

    function shuffle() {
      cards = [...values, ...values]
        .map((value, index) => ({ value, id: `${value}-${index}`, open: false, matched: false }))
        .sort(() => Math.random() - 0.5);
      opened = [];
      matched = 0;
    }

    function draw() {
      host.innerHTML = `
        <div class="memory-grid">
          ${cards.map((card, index) => `
            <button class="memory-card ${card.matched ? "matched" : ""}" type="button" data-card="${index}">
              ${card.open || card.matched ? esc(card.value) : "?"}
            </button>
          `).join("")}
        </div>
        <p>paires trouvées : <strong>${matched}/${values.length}</strong></p>
        <button class="game-action" type="button" data-memory-reset>mélanger</button>
      `;
      $$("[data-card]", host).forEach((button) => {
        button.addEventListener("click", () => {
          const card = cards[Number(button.dataset.card)];
          if (card.open || card.matched || opened.length >= 2) return;
          card.open = true;
          opened.push(card);
          draw();
          if (opened.length === 2) {
            setTimeout(() => {
              if (opened[0].value === opened[1].value) {
                opened[0].matched = true;
                opened[1].matched = true;
                matched += 1;
              }
              opened.forEach((item) => { item.open = false; });
              opened = [];
              draw();
            }, 650);
          }
        });
      });
      $("[data-memory-reset]", host).addEventListener("click", () => {
        shuffle();
        draw();
      });
    }

    shuffle();
    draw();
  }

  function initReflex() {
    const host = $("[data-reflex]");
    if (!host) return;
    let timer = null;
    let started = 0;
    let ready = false;
    const bestKey = "signalReflexBest";

    host.innerHTML = `
      <div class="reflex-zone">
        <button class="game-action" type="button" data-reflex-start>démarrer</button>
        <button class="reflex-pad" type="button" data-reflex-pad>attends le vert, puis clique</button>
        <p data-reflex-result>meilleur temps : ${localStorage.getItem(bestKey) || "--"} ms</p>
      </div>
    `;

    const pad = $("[data-reflex-pad]", host);
    const result = $("[data-reflex-result]", host);
    $("[data-reflex-start]", host).addEventListener("click", () => {
      clearTimeout(timer);
      ready = false;
      pad.classList.remove("ready");
      pad.textContent = "patience...";
      timer = setTimeout(() => {
        ready = true;
        started = performance.now();
        pad.classList.add("ready");
        pad.textContent = "clique maintenant";
      }, 900 + Math.random() * 2200);
    });

    pad.addEventListener("click", () => {
      if (!ready) {
        clearTimeout(timer);
        pad.textContent = "trop tôt. relance.";
        pad.classList.remove("ready");
        return;
      }
      const ms = Math.round(performance.now() - started);
      const best = Number(localStorage.getItem(bestKey) || Infinity);
      if (ms < best) localStorage.setItem(bestKey, String(ms));
      result.textContent = `temps : ${ms} ms · meilleur : ${localStorage.getItem(bestKey)} ms`;
      ready = false;
      pad.classList.remove("ready");
      pad.textContent = "démarre une nouvelle manche";
    });
  }

  function initHeadlineLab() {
    const host = $("[data-headline-lab]");
    if (!host) return;
    const starts = ["Ce que personne ne t'explique sur", "Le guide clair pour comprendre", "Pourquoi tout le monde reparle de", "Le vrai problème derrière"];
    const subjects = ["les agents IA", "le zero trust", "les jeux indés", "l'OSINT responsable", "la sécurité Web3", "les sources fiables"];
    const angles = ["sans jargon", "avec des exemples", "en 10 minutes", "avant de te faire piéger", "pour écrire un meilleur article"];

    function pick(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function draw() {
      host.innerHTML = `
        <h3>${esc(`${pick(starts)} ${pick(subjects)} ${pick(angles)}`)}</h3>
        <p>mini-jeu rédaction : génère un titre, puis essaie d'écrire l'intro en 4 lignes.</p>
        <button class="game-action" type="button" data-new-headline>nouveau titre</button>
      `;
      $("[data-new-headline]", host).addEventListener("click", draw);
    }
    draw();
  }

  function initGames() {
    initQuiz();
    initMemory();
    initReflex();
    initHeadlineLab();
  }

  function initNav() {
    const toggle = $("[data-nav-toggle]");
    const links = $("[data-nav-links]");
    toggle?.addEventListener("click", () => links?.classList.toggle("open"));
    const page = document.body.dataset.page;
    $$("[data-nav]").forEach((link) => {
      link.classList.toggle("active", link.dataset.nav === page);
    });
    $$("[data-year]").forEach((el) => { el.textContent = new Date().getFullYear(); });
    $$("[data-updated]").forEach((el) => { el.textContent = data.site.updated; });
  }

  function init() {
    initNav();
    renderTrendMini();
    renderTrendBoard();
    renderFeatured();
    renderHomeArticles();
    renderArticlesPage();
    renderArticlePage();
    renderVideoTheater();
    renderVideoGrid();
    renderTutorials();
    renderHomeTutos();
    renderSources();
    initGames();
  }

  document.addEventListener("DOMContentLoaded", init);
})();

</script>
</body>
</html>
